<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReFoWa - Reduce Food Waste</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Spezifische Ampelfarben laut Vorgabe */
        .status-weinrot { color: #800020; }
        .status-rot { color: #ef4444; }
        .status-gelb { color: #eab308; }
        .status-gruen { color: #22c55e; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide"><i class="fa-solid fa-fridge mr-2"></i>ReFoWa</h1>
            <p class="text-sm italic hidden sm:block">Reduce Food Waste</p>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl">

        <section class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-emerald-700"><i class="fa-solid fa-barcode mr-2"></i>Lebensmittel scannen</h2>
            
            <div id="reader" class="w-full max-w-sm mx-auto mb-4 overflow-hidden rounded-lg"></div>
            
            <div class="flex flex-col sm:flex-row gap-2 justify-center">
                <button onclick="startScanner()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition">
                    Kamera-Scanner starten
                </button>
                <button onclick="simulateScan()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Demo-Produkt scannen
                </button>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-emerald-700"><i class="fa-solid fa-box-tissue mr-2"></i>Mein Kühlschrank</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 text-gray-500 text-sm">
                            <th class="pb-2">Status</th>
                            <th class="pb-2">Produkt</th>
                            <th class="pb-2">Ablaufdatum</th>
                            <th class="pb-2 text-right">Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="kuehlschrank-liste">
                        </tbody>
                </table>
            </div>
            <p id="leerer-kuehlschrank" class="text-gray-400 text-center py-6 hidden">Dein Kühlschrank ist leer. Scanne ein Produkt!</p>
        </section>

        <section class="bg-emerald-50 border border-emerald-200 rounded-xl p-6">
            <h2 class="text-xl font-semibold mb-4 text-emerald-800"><i class="fa-solid fa-utensils mr-2"></i>Rezept-Vorschläge (Basierend auf Ablaufdatum)</h2>
            <div id="rezept-container" class="grid gap-4 md:grid-cols-2">
                </div>
        </section>

    </main>

    <script>
        // Demo-Datenbank für gescannte Barcodes
        const produktDatenbank = {
            "4000123456789": { name: "Milch", tageBisAblauf: 3 },
            "4000987654321": { name: "Frischkäse", tageBisAblauf: 1 },
            "4001122334455": { name: "Tomaten", tageBisAblauf: 6 },
            "4005566778899": { name: "Naturjoghurt", tageBisAblauf: 12 }
        };

        // Das Inventar im Kühlschrank (wird im LocalStorage gespeichert)
        let kuehlschrank = JSON.parse(localStorage.getItem('kuehlschrank')) || [];

        // Funktion zum Berechnen der verbleibenden Tage
        function berechneRestTage(ablaufDatumStr) {
            const heute = new Date();
            heute.setHours(0,0,0,0);
            const ablauf = new Date(ablaufDatumStr);
            ablauf.setHours(0,0,0,0);
            
            const unterschiedZeit = ablauf - heute;
            return Math.ceil(unterschiedZeit / (1000 * 60 * 60 * 24));
        }

        // Funktion zur Bestimmung der Statusfarbe laut deinen Vorgaben
        function holeStatusKlasse(tage) {
            if (tage <= 1) return 'status-weinrot';
            if (tage >= 2 && tage <= 3) return 'status-rot';
            if (tage >= 4 && tage <= 8) return 'status-gelb';
            return 'status-gruen'; // Mehr als 9 Tage
        }

        // Kühlschrank-Ansicht aktualisieren
        function updateKuehlschrankAnsicht() {
            const liste = document.getElementById('kuehlschrank-liste');
            const leererHinweis = document.getElementById('leerer-kuehlschrank');
            liste.innerHTML = '';

            // Sortieren nach Ablaufdatum (dringendste zuerst)
            kuehlschrank.sort((a, b) => new Date(a.ablaufDatum) - new Date(b.ablaufDatum));

            if (kuehlschrank.length === 0) {
                leererHinweis.classList.remove('hidden');
            } else {
                leererHinweis.classList.add('hidden');
                
                kuehlschrank.forEach((item, index) => {
                    const tage = berechneRestTage(item.ablaufDatum);
                    const statusKlasse = holeStatusKlasse(tage);
                    
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-100 hover:bg-gray-50 text-sm md:text-base";
                    tr.innerHTML = `
                        <td class="py-3 px-1">
                            <i class="fa-solid fa-circle text-xl ${statusKlasse}"></i>
                        </td>
                        <td class="py-3 font-medium">${item.name}</td>
                        <td class="py-3 text-gray-500">${new Date(item.ablaufDatum).toLocaleDateString('de-DE')} (${tage < 0 ? 'Abgelaufen' : tage + ' Tage'})</td>
                        <td class="py-3 text-right">
                            <button onclick="loescheProdukt(${index})" class="text-red-500 hover:text-red-700 p-1">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    `;
                    liste.appendChild(tr);
                });
            }
            speichereDaten();
            generiereRezeptVorschlaege();
        }

        // Produkt hinzufügen
        function fuegeProduktHinzu(name, tageBisAblauf) {
            const ablaufDatum = new Date();
            ablaufDatum.setDate(ablaufDatum.getDate() + tageBisAblauf);

            kuehlschrank.push({
                name: name,
                ablaufDatum: ablaufDatum.toISOString().split('T')[0]
            });

            updateKuehlschrankAnsicht();
        }

        // Produkt löschen (wenn gegessen oder weggeworfen)
        function loescheProdukt(index) {
            kuehlschrank.splice(index, 1);
            updateKuehlschrankAnsicht();
        }

        // In LocalStorage speichern
        function speichereDaten() {
            localStorage.setItem('kuehlschrank', JSON.stringify(kuehlschrank));
        }

        // Simulation eines Scans
        function simulateScan() {
            const barcodes = Object.keys(produktDatenbank);
            const zufallsBarcode = barcodes[Math.floor(Math.random() * barcodes.length)];
            const produkt = produktDatenbank[zufallsBarcode];
            
            alert(`Gescannt: ${produkt.name} (Haltbar: ${produkt.tageBisAblauf} Tage)`);
            fuegeProduktHinzu(produkt.name, produkt.tageBisAblauf);
        }

        // Kochvorschläge basierend auf den am nächsten ablaufenden Zutaten
        function generiereRezeptVorschlaege() {
            const container = document.getElementById('rezept-container');
            container.innerHTML = '';

            if (kuehlschrank.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic">Füge Lebensmittel hinzu, um Rezeptvorschläge zu erhalten.</p>';
                return;
            }

            // Hole die zwei am dringendsten ablaufenden Zutaten
            const dringendeZutaten = kuehlschrank.slice(0, 2).map(i => i.name);

            // Einfache Logik für Rezepte
            let rezepte = [
                { title: "Reste-Pfanne", beschreibung: `Brate deine ${dringendeZutaten.join(' und ')} zusammen mit etwas Öl und Gewürzen in der Pfanne an.`, icon: "fa-fire-burner" },
                { title: "Kreativer Auflauf", beschreibung: `Schneide alles klein, gib es in eine Auflaufform und überbacke ${dringendeZutaten.join(' / ')} mit etwas Käse.`, icon: "fa-bowl-food" }
            ];

            rezepte.forEach(rezept => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-lg shadow-sm border border-emerald-100 flex gap-3";
                div.innerHTML = `
                    <div class="text-emerald-600 text-2xl mt-1">
                        <i class="fa-solid ${rezept.icon}"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-emerald-900">${rezept.title}</h3>
                        <p class="text-sm text-gray-600 mt-1">${rezept.beschreibung}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Echter Kamera-Scanner (Html5Qrcode) initialisieren
        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                // Wenn der Barcode in unserer Datenbank existiert
                if (produktDatenbank[decodedText]) {
                    const prod = produktDatenbank[decodedText];
                    fuegeProduktHinzu(prod.name, prod.tageBisAblauf);
                    alert(`Erfolgreich gescannt: ${prod.name}`);
                } else {
                    // Fallback, falls der Barcode unbekannt ist
                    const name = prompt("Unbekannter Barcode. Wie heißt das Produkt?");
                    if(name) fuegeProduktHinzu(name, 5);
                }
                html5QrCode.stop();
            };
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .catch(err => {
                alert("Kamera konnte nicht geöffnet werden. Nutze den Demo-Button.");
                console.error(err);
            });
        }

        // Beim Laden der Seite Liste aufrufen
        updateKuehlschrankAnsicht();
    </script>
</body>
</html>
